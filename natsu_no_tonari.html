<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#070B14">
<title>夏のとなり</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#070B14;
  --glass:rgba(9,14,28,.62);
  --glass-strong:rgba(7,11,22,.86);
  --hair:rgba(255,255,255,.15);
  --sakura:#FBDCE4;
  --sakura-dim:#E3B9C6;
  --enji:#B0384C;
  --gold:#EBC978;
  --gold-dim:#A98B45;
  --text:#F3F0F4;
  --mute:#AEB6C7;
  --lh:1.85em;
  --pad:16px;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --box-w:min(720px,100%);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;padding:0;overflow:hidden;background:var(--ink);}
body{
  font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN","Hiragino Sans","Noto Sans JP",sans-serif;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  user-select:none;
  overscroll-behavior:none;
}
#app{position:fixed;inset:0;overflow:hidden;}

/* ============ 背景ステージ ============ */
#stage{position:absolute;inset:0;background:#04060c;}
.layer{position:absolute;inset:0;opacity:0;transition:opacity .85s ease;}
.layer.on{opacity:1;}
.layer .inner{
  position:absolute;inset:-3%;
  background-size:cover;background-position:center 22%;
  will-change:transform;
}
.layer .inner.kb{animation:kenburns 34s ease-out forwards;}
.layer .inner.kb2{animation:kenburns2 38s ease-out forwards;}
@keyframes kenburns{
  from{transform:scale(1.02) translate3d(0,0,0);}
  to{transform:scale(1.10) translate3d(-1.2%,-1.4%,0);}
}
@keyframes kenburns2{
  from{transform:scale(1.10) translate3d(-1%,-1%,0);}
  to{transform:scale(1.02) translate3d(.8%,.6%,0);}
}
/* 画像が無いときの代替背景 */
.layer .inner.ph{background-size:cover;background-position:center;}
#vignette{position:absolute;inset:0;pointer-events:none;
  background:
   radial-gradient(120% 80% at 50% 30%,rgba(0,0,0,0) 40%,rgba(0,0,0,.45) 100%),
   linear-gradient(to bottom,rgba(0,0,0,.28) 0%,rgba(0,0,0,0) 22%,rgba(0,0,0,0) 45%,rgba(4,6,14,.72) 100%);
}
#fw{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .6s ease;}
#fw.on{opacity:1;}
#flicker{position:absolute;inset:0;pointer-events:none;opacity:0;mix-blend-mode:screen;
  background:radial-gradient(60% 45% at 50% 78%,rgba(255,168,72,.55) 0%,rgba(255,132,40,.20) 45%,rgba(255,110,20,0) 78%);
  transition:opacity .5s ease;}
#flash{position:absolute;inset:0;pointer-events:none;background:#fff;opacity:0;}
#curtain{position:absolute;inset:0;background:#04060c;opacity:0;pointer-events:none;transition:opacity .5s ease;}
#curtain.on{opacity:1;}

/* ============ UI ============ */
#ui{position:absolute;inset:0;opacity:0;transition:opacity .5s ease;pointer-events:none;}
#ui.show{opacity:1;pointer-events:auto;}
#ui.hidden{opacity:0;pointer-events:none;}
#tap{position:absolute;inset:0;}

#topbar{
  position:absolute;top:calc(var(--sat) + 10px);right:10px;
  display:flex;gap:8px;z-index:6;
}
.ibtn{
  width:38px;height:38px;border-radius:13px;border:1px solid var(--hair);
  background:rgba(10,15,28,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  color:var(--text);font-size:10px;font-weight:700;letter-spacing:.02em;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  cursor:pointer;transition:transform .16s ease,background .2s ease,border-color .2s;
  padding:0;line-height:1;font-family:inherit;
}
.ibtn:active{transform:scale(.9);background:rgba(176,56,76,.42);}
.ibtn svg{width:15px;height:15px;stroke:var(--sakura);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.ibtn span{font-size:8.5px;color:var(--mute);}

/* 会話ボックス */
#dialogue{
  position:absolute;left:50%;transform:translateX(-50%);
  bottom:calc(var(--sab) + 14px);
  width:calc(var(--box-w) - 24px);
  z-index:4;
}
#plate{
  display:inline-flex;align-items:center;gap:7px;
  margin:0 0 -9px 12px;padding:5px 15px 6px;
  border-radius:12px 12px 4px 4px;
  background:linear-gradient(180deg,rgba(176,56,76,.92),rgba(120,32,50,.92));
  border:1px solid rgba(235,201,120,.45);
  box-shadow:0 4px 14px rgba(0,0,0,.35);
  font-size:13.5px;font-weight:700;letter-spacing:.06em;
  color:#FFF3F6;position:relative;z-index:2;
  opacity:0;transform:translateY(4px);transition:opacity .25s,transform .25s;
}
#plate.on{opacity:1;transform:translateY(0);}
#plate .bellmark{width:9px;height:9px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#FFF0C0,var(--gold) 60%,#8a6a20);
  box-shadow:0 0 6px rgba(235,201,120,.6);flex:none;}
#box{
  position:relative;
  background:var(--glass);
  backdrop-filter:blur(14px) saturate(1.1);-webkit-backdrop-filter:blur(14px) saturate(1.1);
  border:1px solid var(--hair);
  border-radius:20px;
  padding:15px 17px 16px;
  box-shadow:0 10px 34px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.06);
}
#box:before{content:"";position:absolute;left:17px;right:17px;top:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(235,201,120,.5),transparent);}
#flow{
  height:calc(var(--lh) * 3);
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  font-size:15.5px;line-height:var(--lh);letter-spacing:.02em;
  touch-action:pan-y;
}
#flow::-webkit-scrollbar{display:none;}
#flow.masked{
  -webkit-mask-image:linear-gradient(to bottom,transparent 0,rgba(0,0,0,.35) .5em,#000 1.3em,#000 100%);
  mask-image:linear-gradient(to bottom,transparent 0,rgba(0,0,0,.35) .5em,#000 1.3em,#000 100%);
}
.ln{margin:0;padding:0;opacity:0;transform:translateY(6px);
  animation:lnIn .32s ease forwards;word-break:normal;overflow-wrap:anywhere;}
@keyframes lnIn{to{opacity:1;transform:translateY(0)}}
.ln.old{opacity:.42;}
.ln.a{color:var(--sakura);}
.ln.p{color:#F6E3B6;}
.ln.m{color:#CBD2E2;font-size:14.5px;}
.ln.n{color:#B9C2D6;font-size:14.5px;}
#bell{
  position:absolute;right:14px;bottom:9px;width:16px;height:20px;opacity:0;
  transition:opacity .3s;pointer-events:none;
}
#bell.on{opacity:1;animation:bellSwing 1.9s ease-in-out infinite;}
#bell .b{width:12px;height:12px;margin:5px auto 0;border-radius:50% 50% 48% 48%;
  background:radial-gradient(circle at 34% 28%,#FFF6D8,var(--gold) 55%,#7d5f1c);
  box-shadow:0 0 8px rgba(235,201,120,.55);}
#bell .c{width:1px;height:5px;margin:0 auto;background:var(--gold-dim);}
@keyframes bellSwing{0%,100%{transform:rotate(-8deg) translateY(0)}50%{transform:rotate(8deg) translateY(1px)}}

/* 選択肢 */
#choices{
  position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);
  width:calc(var(--box-w) - 34px);
  display:none;flex-direction:column;gap:10px;z-index:5;
}
#choices.on{display:flex;}
#dialogue{transition:opacity .3s ease;}
.ch{
  position:relative;
  padding:14px 16px 14px 40px;border-radius:16px;
  background:linear-gradient(180deg,rgba(14,21,40,.80),rgba(9,14,28,.86));
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(235,201,120,.28);
  color:var(--text);font-size:14.5px;font-weight:500;text-align:left;
  font-family:inherit;cursor:pointer;
  box-shadow:0 6px 20px rgba(0,0,0,.36);
  opacity:0;transform:translateY(10px);
  animation:chIn .38s cubic-bezier(.2,.9,.3,1) forwards;
  transition:background .18s,border-color .18s,transform .12s;
}
.ch:nth-child(1){animation-delay:.02s}.ch:nth-child(2){animation-delay:.09s}
.ch:nth-child(3){animation-delay:.16s}.ch:nth-child(4){animation-delay:.23s}
@keyframes chIn{to{opacity:1;transform:translateY(0)}}
.ch:before{content:"";position:absolute;left:16px;top:50%;width:9px;height:9px;margin-top:-4.5px;
  border-radius:50%;background:radial-gradient(circle at 35% 30%,#FFF3CE,var(--gold) 58%,#7d5f1c);
  box-shadow:0 0 7px rgba(235,201,120,.5);}
.ch:active{transform:scale(.985);background:linear-gradient(180deg,rgba(176,56,76,.55),rgba(120,32,50,.6));border-color:rgba(251,220,228,.6);}

/* ============ オーバーレイ共通 ============ */
.ov{position:absolute;inset:0;z-index:20;display:none;
  background:rgba(4,7,15,.90);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.ov.on{display:flex;flex-direction:column;animation:fadeIn .28s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ovhead{display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--sat) + 14px) 16px 12px;border-bottom:1px solid rgba(255,255,255,.08);}
.ovtitle{font-family:"Shippori Mincho B1",serif;font-size:16px;letter-spacing:.22em;color:var(--sakura);}
.ovbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px calc(var(--sab) + 24px);}
.xbtn{width:34px;height:34px;border-radius:11px;border:1px solid var(--hair);
  background:rgba(255,255,255,.05);color:var(--text);font-size:16px;cursor:pointer;font-family:inherit;}
.xbtn:active{transform:scale(.92)}

/* ログ */
.logline{margin:0 0 11px;font-size:14px;line-height:1.75;}
.logname{display:block;font-size:10.5px;letter-spacing:.14em;color:var(--gold);margin-bottom:2px;}
.logline.m .logtext{color:#AEB6C7;}
.logempty{color:var(--mute);font-size:13px;text-align:center;padding:40px 0;}

/* ギャラリー */
#galGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}
.gcell{position:relative;aspect-ratio:9/16;border-radius:13px;overflow:hidden;
  background:rgba(255,255,255,.05);border:1px solid var(--hair);cursor:pointer;}
.gcell img{width:100%;height:100%;object-fit:cover;display:block;}
.gcell.lock{display:flex;align-items:center;justify-content:center;color:#4B5468;font-size:20px;}
.gcell .cap{position:absolute;left:0;right:0;bottom:0;padding:14px 8px 6px;font-size:10.5px;
  background:linear-gradient(transparent,rgba(0,0,0,.8));color:#E6E1E8;}
#gview{position:absolute;inset:0;z-index:30;display:none;background:#04060c;}
#gview.on{display:block;}
#gview img{width:100%;height:100%;object-fit:contain;}

/* ============ タイトル ============ */
#title{position:absolute;inset:0;z-index:15;display:none;overflow:hidden;}
#title.on{display:block;}
#titleBg{position:absolute;inset:-4%;background-size:cover;background-position:center;
  animation:kenburns 46s ease-out infinite alternate;}
#titleVeil{position:absolute;inset:0;background:
  linear-gradient(180deg,rgba(4,7,16,.55),rgba(4,7,16,.18) 40%,rgba(4,7,16,.82));}
.tWrap{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;
  padding:calc(var(--sat) + 34px) 24px calc(var(--sab) + 28px);}
.tMain{writing-mode:vertical-rl;text-orientation:upright;
  font-family:"Shippori Mincho B1",serif;font-weight:800;
  font-size:clamp(38px,12vw,58px);letter-spacing:.16em;line-height:1.12;
  color:#FFF7F2;text-shadow:0 3px 22px rgba(0,0,0,.7),0 0 40px rgba(255,190,140,.18);
  margin:0 6px 0 auto;padding-right:2px;height:auto;}
.tSub{writing-mode:vertical-rl;font-family:"Shippori Mincho B1",serif;font-size:12px;
  letter-spacing:.5em;color:rgba(251,220,228,.72);margin:6px 14px 0 auto;}
.tMenu{display:flex;flex-direction:column;gap:10px;width:min(340px,100%);margin:0 auto;}
.tbtn{padding:15px 18px;border-radius:16px;font-family:inherit;font-size:15px;font-weight:700;
  letter-spacing:.14em;color:#FFF3F6;cursor:pointer;
  background:linear-gradient(180deg,rgba(176,56,76,.72),rgba(105,28,44,.78));
  border:1px solid rgba(235,201,120,.42);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 8px 26px rgba(0,0,0,.4);transition:transform .14s,filter .2s;}
.tbtn.sub{background:rgba(12,18,34,.62);border-color:var(--hair);color:var(--text);font-weight:500;letter-spacing:.1em;font-size:13.5px;padding:12px 16px;}
.tbtn:active{transform:scale(.97);filter:brightness(1.12);}
.tbtn[disabled]{opacity:.34;pointer-events:none;}
.tnote{text-align:center;font-size:11px;color:var(--mute);margin-top:2px;letter-spacing:.06em;}

/* 名前入力 */
#nameOv .card{margin:auto;width:min(400px,100%);}
.card{background:rgba(10,16,30,.72);border:1px solid var(--hair);border-radius:22px;padding:24px 20px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 14px 44px rgba(0,0,0,.5);}
.card h3{margin:0 0 6px;font-family:"Shippori Mincho B1",serif;font-size:17px;letter-spacing:.16em;color:var(--sakura);font-weight:600;}
.card p{margin:0 0 16px;font-size:12.5px;line-height:1.7;color:var(--mute);}
#nameInput{width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(235,201,120,.35);
  background:rgba(255,255,255,.06);color:var(--text);font-size:16px;font-family:inherit;text-align:center;
  letter-spacing:.14em;outline:none;}
#nameInput:focus{border-color:var(--sakura);box-shadow:0 0 0 3px rgba(251,220,228,.12);}
.ovcenter{flex:1;display:flex;padding:20px 18px;}

.hint{font-size:11.5px;color:var(--mute);line-height:1.7;margin:10px 0 0;}
.row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.row .tbtn{flex:1;min-width:130px;text-align:center;}

/* トースト */
#toast{position:absolute;left:50%;top:calc(var(--sat) + 62px);transform:translate(-50%,-8px);
  background:rgba(7,11,22,.9);border:1px solid rgba(235,201,120,.35);color:var(--text);
  padding:9px 16px;border-radius:999px;font-size:12px;letter-spacing:.08em;z-index:40;
  opacity:0;transition:.28s;pointer-events:none;white-space:nowrap;}
#toast.on{opacity:1;transform:translate(-50%,0);}

/* エンディング */
#ed{position:absolute;inset:0;z-index:18;display:none;background:#04060c;}
#ed.on{display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn 1.4s ease;}
#edTitle{font-family:"Shippori Mincho B1",serif;font-size:clamp(22px,7vw,32px);letter-spacing:.3em;
  color:#FFF6EE;text-align:center;text-shadow:0 0 30px rgba(255,190,140,.25);}
#edSub{font-size:11.5px;letter-spacing:.34em;color:var(--gold);margin-top:16px;}
#edBtn{margin-top:38px;}

@media(max-height:640px){
  :root{--lh:1.72em;}
  #flow{font-size:14.5px;}
}
@media(prefers-reduced-motion:reduce){
  .layer .inner.kb,.layer .inner.kb2,#titleBg{animation:none!important;}
  #bell.on{animation:none;}
}
</style>
</head>
<body>
<div id="app">
  <!-- ===== 背景ステージ ===== -->
  <div id="stage">
    <div class="layer" id="lay0"><div class="inner"></div></div>
    <div class="layer" id="lay1"><div class="inner"></div></div>
    <canvas id="fw"></canvas>
    <div id="flicker"></div>
    <div id="vignette"></div>
    <div id="flash"></div>
    <div id="curtain"></div>
  </div>

  <!-- ===== 会話UI ===== -->
  <div id="ui">
    <div id="tap"></div>
    <div id="topbar">
      <button class="ibtn" id="btnLog" aria-label="ログ">
        <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg><span>ログ</span>
      </button>
      <button class="ibtn" id="btnHide" aria-label="UI非表示">
        <svg viewBox="0 0 24 24"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg><span>隠す</span>
      </button>
      <button class="ibtn" id="btnSound" aria-label="音">
        <svg viewBox="0 0 24 24"><path d="M11 5 6 9H3v6h3l5 4V5z"/><path d="M16 9c1.2 1.2 1.2 4.8 0 6"/></svg><span>音</span>
      </button>
      <button class="ibtn" id="btnMenu" aria-label="メニュー">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg><span>他</span>
      </button>
    </div>

    <div id="dialogue">
      <div id="plate"><i class="bellmark"></i><span id="plateName"></span></div>
      <div id="box">
        <div id="flow"></div>
        <div id="bell"><div class="c"></div><div class="b"></div></div>
      </div>
    </div>
    <div id="choices"></div>
  </div>

  <!-- ===== ログ ===== -->
  <div class="ov" id="logOv">
    <div class="ovhead"><div class="ovtitle">ロ グ</div><button class="xbtn" data-close="logOv">✕</button></div>
    <div class="ovbody" id="logBody"></div>
  </div>

  <!-- ===== メニュー ===== -->
  <div class="ov" id="menuOv">
    <div class="ovhead"><div class="ovtitle">メ ニ ュ ー</div><button class="xbtn" data-close="menuOv">✕</button></div>
    <div class="ovbody">
      <div class="card">
        <h3>設定</h3>
        <p>音量はいつでも変えられます。文字の速さは告白などの大切な場面では自動でゆっくりになります。</p>
        <div style="font-size:12px;color:#AEB6C7;letter-spacing:.1em;margin-bottom:4px;">BGM</div>
        <input type="range" id="volBgm" min="0" max="100" value="42" style="width:100%">
        <div style="font-size:12px;color:#AEB6C7;letter-spacing:.1em;margin:12px 0 4px;">効果音・環境音</div>
        <input type="range" id="volSe" min="0" max="100" value="70" style="width:100%">
        <div style="font-size:12px;color:#AEB6C7;letter-spacing:.1em;margin:12px 0 4px;">文字の速さ</div>
        <input type="range" id="spd" min="0" max="100" value="55" style="width:100%">
      </div>
      <div class="row">
        <button class="tbtn sub" id="btnSaveNow">ここまでを保存</button>
        <button class="tbtn sub" id="btnToTitle">タイトルへ戻る</button>
      </div>
      <p class="hint">シーンが変わるたびに自動で保存されます。アプリを閉じても「つづきから」で戻れます。</p>
    </div>
  </div>

  <!-- ===== ギャラリー ===== -->
  <div class="ov" id="galOv">
    <div class="ovhead"><div class="ovtitle">思 い 出</div><button class="xbtn" data-close="galOv">✕</button></div>
    <div class="ovbody"><div id="galGrid"></div>
      <p class="hint" id="galNote"></p>
    </div>
    <div id="gview"><img id="gviewImg" alt=""></div>
  </div>

  <!-- ===== 名前入力 ===== -->
  <div class="ov" id="nameOv">
    <div class="ovcenter">
      <div class="card">
        <h3>きみの名前</h3>
        <p>茜がこの名前で呼びかけます。空欄のままなら「きみ」と呼ばれます。</p>
        <input id="nameInput" maxlength="8" placeholder="ハル" autocomplete="off">
        <div class="row"><button class="tbtn" id="nameGo">この名前ではじめる</button></div>
      </div>
    </div>
  </div>

  <!-- ===== エンディング ===== -->
  <div id="ed">
    <div id="edTitle"></div>
    <div id="edSub"></div>
    <div id="edEpi"></div>
    <button class="tbtn" id="edBtn">タイトルへ</button>
  </div>

  <!-- ===== タイトル ===== -->
  <div id="title">
    <div id="titleBg"></div>
    <div id="titleVeil"></div>
    <div class="tWrap">
      <div style="display:flex;justify-content:flex-end;align-items:flex-start;">
        <div class="tSub">ひと夏の、となり</div>
        <h1 class="tMain">夏のとなり</h1>
      </div>
      <div class="tMenu">
        <button class="tbtn" id="btnNew">はじめから</button>
        <button class="tbtn sub" id="btnCont" disabled>つづきから</button>
        <button class="tbtn sub" id="btnGal" disabled>思い出（ギャラリー）</button>
        <p class="tnote" id="titleNote"></p>
      </div>
    </div>
  </div>

  <div id="toast"></div>
</div>
<script>
/* =========================================================
   夏のとなり  /  core : storage, assets, audio
   ========================================================= */
'use strict';
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];

const clamp = (v,a,b) => v<a?a:v>b?b:v;
const rnd = (a,b) => a + Math.random()*(b-a);
const pick = a => a[Math.floor(Math.random()*a.length)];

/* ---------- 保存（window.storage → localStorage → メモリ） ---------- */
const Store = (() => {
  const mem = {};
  const hasWS = typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function';
  let ls = null;
  try { const k='__t'; localStorage.setItem(k,'1'); localStorage.removeItem(k); ls = localStorage; } catch(e){}
  return {
    async get(k){
      if (hasWS) { try { const r = await window.storage.get(k); if (r && r.value != null) return JSON.parse(r.value); } catch(e){} }
      if (ls) { try { const v = ls.getItem(k); if (v != null) return JSON.parse(v); } catch(e){} }
      return mem[k] !== undefined ? mem[k] : null;
    },
    async set(k,v){
      mem[k] = v;
      const s = JSON.stringify(v);
      if (hasWS) { try { await window.storage.set(k, s); return true; } catch(e){} }
      if (ls) { try { ls.setItem(k, s); return true; } catch(e){} }
      return false;
    },
    async del(k){
      delete mem[k];
      if (hasWS) { try { await window.storage.delete(k); } catch(e){} }
      if (ls) { try { ls.removeItem(k); } catch(e){} }
    }
  };
})();

/* イラストは <script id="ART_DATA"> の window.ART に base64 で同梱されており、
   ファイル単体をコピーするだけで（images フォルダが無くても）表示できる */
function loadEmbeddedArt(){
  const art = window.ART || {};
  let n = 0;
  SLOTS.forEach(s=>{ if (art[s.k]) { IMG[s.k] = art[s.k]; n++; } });
  return n;
}

/* =========================================================
   Audio : すべて手続き生成（外部ファイルなし）
   ========================================================= */
const Audio_ = (() => {
  let ctx=null, master=null, bgmG=null, seG=null, ambG=null, verb=null;
  let ready=false;
  let vol = {bgm:.42, se:.70};
  let bgmTimer=null, bgmMood=null, bgmNodes=[];
  let ambNodes=[];

  function makeVerb(){
    const c = ctx.createConvolver();
    const len = ctx.sampleRate*2.0, b = ctx.createBuffer(2,len,ctx.sampleRate);
    for(let ch=0;ch<2;ch++){
      const d=b.getChannelData(ch);
      for(let i=0;i<len;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.6)*0.5; }
    }
    c.buffer=b; return c;
  }
  function init(){
    if(ready) return;
    try{
      const AC = window.AudioContext||window.webkitAudioContext;
      if(!AC) return;
      ctx = new AC();
      master = ctx.createGain(); master.gain.value=1; master.connect(ctx.destination);
      verb = makeVerb();
      const vg = ctx.createGain(); vg.gain.value=.30; verb.connect(vg); vg.connect(master);
      bgmG = ctx.createGain(); bgmG.gain.value=vol.bgm; bgmG.connect(master); bgmG.connect(verb);
      seG  = ctx.createGain(); seG.gain.value=vol.se;  seG.connect(master);
      const sv = ctx.createGain(); sv.gain.value=.22; seG.connect(sv); sv.connect(verb);
      ambG = ctx.createGain(); ambG.gain.value=0;     ambG.connect(master);
      ready=true;
    }catch(e){}
  }
  const resume = () => { if(!ready) init(); if(ctx && ctx.state==='suspended') ctx.resume(); };
  const now = () => ctx.currentTime;

  function noiseBuf(sec, type){
    const len=Math.floor(ctx.sampleRate*sec), b=ctx.createBuffer(1,len,ctx.sampleRate), d=b.getChannelData(0);
    let last=0;
    for(let i=0;i<len;i++){
      const w=Math.random()*2-1;
      if(type==='brown'){ last=(last+0.02*w)/1.02; d[i]=last*3.2; } else d[i]=w;
    }
    return b;
  }
  function tone(o){
    if(!ready) return;
    const {f=880,t=0,d=.2,g=.15,type='sine',to=null,fil=null,q=1} = o;
    const osc=ctx.createOscillator(), gn=ctx.createGain();
    osc.type=type; osc.frequency.setValueAtTime(f, now()+t);
    if(to) osc.frequency.exponentialRampToValueAtTime(Math.max(1,to), now()+t+d*.85);
    gn.gain.setValueAtTime(0, now()+t);
    gn.gain.linearRampToValueAtTime(g, now()+t+Math.min(.012,d*.2));
    gn.gain.exponentialRampToValueAtTime(.0001, now()+t+d);
    let node=osc;
    if(fil){ const bf=ctx.createBiquadFilter(); bf.type='lowpass'; bf.frequency.value=fil; bf.Q.value=q; node.connect(bf); node=bf; }
    node.connect(gn); gn.connect(seG);
    osc.start(now()+t); osc.stop(now()+t+d+.05);
  }
  function noise(o){
    if(!ready) return;
    const {t=0,d=.3,g=.12,type='white',f=1200,q=1,ft='bandpass',sweep=null}=o;
    const src=ctx.createBufferSource(); src.buffer=noiseBuf(Math.max(.05,d+.05),type);
    const bf=ctx.createBiquadFilter(); bf.type=ft; bf.frequency.setValueAtTime(f, now()+t); bf.Q.value=q;
    if(sweep) bf.frequency.exponentialRampToValueAtTime(Math.max(40,sweep), now()+t+d);
    const gn=ctx.createGain();
    gn.gain.setValueAtTime(0, now()+t);
    gn.gain.linearRampToValueAtTime(g, now()+t+d*.14);
    gn.gain.exponentialRampToValueAtTime(.0001, now()+t+d);
    src.connect(bf); bf.connect(gn); gn.connect(seG);
    src.start(now()+t); src.stop(now()+t+d+.05);
  }
  /* FM系の鈴 */
  function bell(f=1760, g=.10, d=1.5, t=0){
    if(!ready) return;
    const car=ctx.createOscillator(), mod=ctx.createOscillator(), mg=ctx.createGain(), gn=ctx.createGain();
    car.type='sine'; mod.type='sine';
    car.frequency.value=f; mod.frequency.value=f*3.17;
    mg.gain.setValueAtTime(f*2.4, now()+t); mg.gain.exponentialRampToValueAtTime(1, now()+t+d*.5);
    mod.connect(mg); mg.connect(car.frequency);
    gn.gain.setValueAtTime(0, now()+t);
    gn.gain.linearRampToValueAtTime(g, now()+t+.006);
    gn.gain.exponentialRampToValueAtTime(.0001, now()+t+d);
    car.connect(gn); gn.connect(seG);
    car.start(now()+t); mod.start(now()+t); car.stop(now()+t+d+.05); mod.stop(now()+t+d+.05);
  }

  const SE = {
    blip(){ const f=rnd(1180,1360); tone({f,to:f*.86,d:.055,g:.045,type:'triangle',fil:2600}); },
    blip2(){ const f=rnd(900,1000); tone({f,to:f*.9,d:.06,g:.035,type:'sine',fil:2200}); },
    decide(){ bell(1980,.075,.85); tone({f:1046,to:1568,d:.11,g:.09,type:'sine'}); noise({d:.05,g:.03,f:5200,q:1.2}); },
    hover(){ tone({f:1568,d:.05,g:.03,type:'sine'}); },
    bell(){ bell(1568,.11,1.9); },
    trans(){ noise({d:1.1,g:.05,f:1600,sweep:280,q:.7,type:'brown'}); bell(1318,.07,2.2,.15); },
    open(){ tone({f:784,to:1175,d:.16,g:.06,type:'sine'}); },
    close(){ tone({f:1175,to:660,d:.16,g:.055,type:'sine'}); },
    splash(){ noise({d:.30,g:.10,f:2400,sweep:700,q:.9}); tone({f:520,to:240,d:.2,g:.04,type:'sine'}); },
    pop(){ tone({f:220,to:70,d:.13,g:.14,type:'square',fil:900}); noise({d:.09,g:.11,f:2800,q:.8}); },
    paper(){ noise({d:.22,g:.055,f:4200,sweep:2600,q:.6}); },
    step(){ tone({f:rnd(300,360),to:150,d:.09,g:.05,type:'triangle',fil:1200}); },
    boom(){
      tone({f:78,to:34,d:1.5,g:.30,type:'sine'});
      noise({d:1.3,g:.13,f:420,sweep:110,q:.5,type:'brown'});
      for(let i=0;i<16;i++) noise({t:.14+Math.random()*.9,d:.05,g:.028,f:rnd(2200,5200),q:2.4});
    },
    fizz(){ for(let i=0;i<14;i++) noise({t:i*.05+Math.random()*.05,d:.05,g:.022,f:rnd(3600,7200),q:3}); },
    heart(){ tone({f:64,to:44,d:.28,g:.16,type:'sine'}); tone({f:64,to:44,d:.26,g:.12,type:'sine',t:.34}); }
  };
  function se(k){ if(!ready) init(); if(!ready) return; resume(); (SE[k]||function(){})(); }

  /* ---------- 環境音（数秒鳴らしてフェードアウト） ---------- */
  function stopAmb(fade=1.6){
    ambNodes.forEach(n=>{ try{ n.g.gain.cancelScheduledValues(now()); n.g.gain.setValueAtTime(n.g.gain.value, now()); n.g.gain.linearRampToValueAtTime(0, now()+fade); setTimeout(()=>{try{n.s.stop();}catch(e){}}, fade*1000+200);}catch(e){} });
    ambNodes=[];
  }
  function amb(kind, hold=6){
    if(!ready) init(); if(!ready) return; resume();
    stopAmb(.6);
    const defs = {
      matsuri:[{f:620,q:.55,g:.055,type:'brown'},{f:1500,q:.8,g:.018,type:'white'}],
      keidai :[{f:420,q:.6,g:.032,type:'brown'}],
      mushi  :[{f:4600,q:2.2,g:.030,type:'white'},{f:300,q:.7,g:.016,type:'brown'}],
      kawa   :[{f:900,q:.5,g:.050,type:'white'},{f:180,q:.6,g:.030,type:'brown'}],
      yoru   :[{f:260,q:.6,g:.026,type:'brown'}]
    };
    (defs[kind]||defs.yoru).forEach(d=>{
      const s=ctx.createBufferSource(); s.buffer=noiseBuf(4,d.type); s.loop=true;
      const bf=ctx.createBiquadFilter(); bf.type='bandpass'; bf.frequency.value=d.f; bf.Q.value=d.q;
      const g=ctx.createGain(); g.gain.value=0;
      s.connect(bf); bf.connect(g); g.connect(ambG);
      s.start();
      g.gain.linearRampToValueAtTime(d.g*vol.se, now()+1.4);
      g.gain.setValueAtTime(d.g*vol.se, now()+hold);
      g.gain.linearRampToValueAtTime(d.g*vol.se*0.16, now()+hold+3.2);
      ambNodes.push({s,g});
    });
    ambG.gain.setValueAtTime(1, now());
    if(kind==='mushi'){
      let n=0; const chirp=()=>{ if(n++>26||!ambNodes.length) return;
        noise({d:.07,g:.020,f:rnd(5200,7200),q:6}); setTimeout(chirp, rnd(180,520)); };
      setTimeout(chirp,600);
    }
    if(kind==='matsuri'){
      let n=0; const taiko=()=>{ if(n++>16||!ambNodes.length) return;
        tone({f:96,to:52,d:.5,g:.045,type:'sine'}); setTimeout(taiko, rnd(700,1500)); };
      setTimeout(taiko,900);
    }
  }

  /* ---------- BGM（手続き生成の和風アルペジオ＋パッド） ---------- */
  const MOODS = {
    yuu   :{bpm:66, chords:[[57,64,69,73],[55,62,67,71],[53,60,64,69],[52,59,64,67]], scale:[69,71,73,76,78,81,83,85], lead:.55},
    matsuri:{bpm:92, chords:[[57,64,69,71],[59,66,71,74],[57,64,69,73],[62,69,73,76]], scale:[69,71,74,76,78,81,83,86], lead:.75},
    yoru  :{bpm:58, chords:[[45,57,64,69],[48,55,60,67],[43,55,62,67],[41,53,60,65]], scale:[69,72,74,76,79,81,84], lead:.42},
    kokoro:{bpm:54, chords:[[53,60,65,72],[55,62,67,74],[50,57,62,69],[48,55,60,67]], scale:[69,72,74,77,79,81,84], lead:.38},
    ed    :{bpm:62, chords:[[53,60,64,71],[55,62,67,74],[57,64,69,76],[52,59,64,71]], scale:[71,73,76,78,80,83,85], lead:.5}
  };
  const mtof = m => 440*Math.pow(2,(m-69)/12);
  function pad(midi, t, dur, g){
    const o=ctx.createOscillator(), o2=ctx.createOscillator(), gn=ctx.createGain(), bf=ctx.createBiquadFilter();
    o.type='triangle'; o2.type='sine';
    o.frequency.value=mtof(midi); o2.frequency.value=mtof(midi)*1.005;
    bf.type='lowpass'; bf.frequency.value=1500; bf.Q.value=.6;
    gn.gain.setValueAtTime(0,t);
    gn.gain.linearRampToValueAtTime(g, t+dur*.35);
    gn.gain.linearRampToValueAtTime(0.0001, t+dur);
    o.connect(bf); o2.connect(bf); bf.connect(gn); gn.connect(bgmG);
    o.start(t); o2.start(t); o.stop(t+dur+.1); o2.stop(t+dur+.1);
    bgmNodes.push(o,o2);
  }
  function pluck(midi, t, g){
    const o=ctx.createOscillator(), gn=ctx.createGain(), bf=ctx.createBiquadFilter();
    o.type='triangle'; o.frequency.value=mtof(midi);
    bf.type='lowpass'; bf.frequency.setValueAtTime(4200,t); bf.frequency.exponentialRampToValueAtTime(700,t+.7);
    gn.gain.setValueAtTime(0,t); gn.gain.linearRampToValueAtTime(g,t+.008);
    gn.gain.exponentialRampToValueAtTime(.0001,t+1.15);
    o.connect(bf); bf.connect(gn); gn.connect(bgmG);
    o.start(t); o.stop(t+1.25); bgmNodes.push(o);
  }
  function bgm(mood){
    if(!ready) init(); if(!ready) return; resume();
    if(bgmMood===mood) return;
    bgmMood=mood;
    if(bgmTimer) clearInterval(bgmTimer);
    const M=MOODS[mood]||MOODS.yoru;
    const beat=60/M.bpm; let step=0; let t0=now()+.15;
    const tick=()=>{
      if(bgmMood!==mood) return;
      const ahead=now()+.9;
      while(t0<ahead){
        const bar=Math.floor(step/8)%M.chords.length, s=step%8;
        const ch=M.chords[bar];
        if(s===0) ch.forEach((m,i)=> pad(m+ (i>1?0:12), t0, beat*8*.98, .030));
        if(s%2===0 && Math.random()<M.lead+.2){
          const n=M.scale[Math.floor(Math.random()*M.scale.length)] + (Math.random()<.25?12:0);
          pluck(n, t0, .034*(s===0?1.25:.85));
        }
        if(s===4 && Math.random()<.5) pluck(ch[0]+24, t0+beat*.5, .018);
        t0+=beat; step++;
      }
    };
    tick(); bgmTimer=setInterval(tick,300);
  }
  function bgmStop(){ bgmMood=null; if(bgmTimer) clearInterval(bgmTimer); bgmTimer=null; }
  function setVol(k,v){ vol[k]=v; if(!ready) return;
    if(k==='bgm'&&bgmG) bgmG.gain.setTargetAtTime(v, now(), .1);
    if(k==='se'&&seG) seG.gain.setTargetAtTime(v, now(), .1);
  }
  return {init,resume,se,amb,stopAmb,bgm,bgmStop,setVol,get ready(){return ready;}};
})();

/* ---------- 花火キャンバス ---------- */
const FW = (() => {
  const cv=$('#fw'); const cx=cv.getContext('2d');
  let W=0,H=0,parts=[],on=false,raf=null,timer=null,dpr=1;
  function fit(){ dpr=Math.min(2,window.devicePixelRatio||1); W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*dpr; cv.height=H*dpr; cx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize',fit);
  const COL=[[255,214,140],[255,150,120],[150,210,255],[255,255,235],[255,180,220],[190,255,200]];
  function burst(x,y,big){
    const c=pick(COL), n=big?150:95, sp=big?rnd(2.6,4.2):rnd(1.8,3.0);
    for(let i=0;i<n;i++){
      const a=Math.PI*2*i/n + rnd(-.05,.05), s=sp*rnd(.45,1);
      parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,dec:rnd(.006,.013),c,r:rnd(1.2,2.6),tr:[]});
    }
    Audio_.se('boom');
  }
  function loop(){
    cx.clearRect(0,0,W,H);
    cx.globalCompositeOperation='lighter';
    for(let i=parts.length-1;i>=0;i--){
      const p=parts[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.022; p.vx*=0.988; p.vy*=0.988; p.life-=p.dec;
      if(p.life<=0){ parts.splice(i,1); continue; }
      const a=Math.max(0,p.life);
      const g=cx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4.5);
      g.addColorStop(0,`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${a})`);
      g.addColorStop(1,`rgba(${p.c[0]},${p.c[1]},${p.c[2]},0)`);
      cx.fillStyle=g; cx.beginPath(); cx.arc(p.x,p.y,p.r*4.5,0,6.3); cx.fill();
    }
    cx.globalCompositeOperation='source-over';
    raf=requestAnimationFrame(loop);
  }
  function schedule(){
    if(!on) return;
    const big=Math.random()<.42;
    burst(rnd(W*.14,W*.86), rnd(H*.07,H*.30), big);
    timer=setTimeout(schedule, rnd(1500,3400));
  }
  return {
    start(){ if(on) return; on=true; fit(); cv.classList.add('on');
      if(!raf) loop(); setTimeout(schedule, 400); },
    stop(){ on=false; cv.classList.remove('on'); clearTimeout(timer);
      setTimeout(()=>{ if(!on){ cancelAnimationFrame(raf); raf=null; parts=[]; cx.clearRect(0,0,W,H);} },900); },
    one(big=true){ fit(); if(!raf) loop(); cv.classList.add('on'); on=true;
      burst(rnd(W*.2,W*.8), rnd(H*.08,H*.26), big); },
    get on(){return on;}
  };
})();

/* ---------- 光のゆらぎ ---------- */
let flickT=null;
function flicker(mode){
  const el=$('#flicker');
  clearInterval(flickT);
  if(!mode){ el.style.opacity=0; return; }
  const base = mode==='strong' ? .55 : .30;
  const step=()=>{ el.style.transition='opacity .18s ease';
    el.style.opacity = (base*rnd(.55,1.25)).toFixed(3); };
  step(); flickT=setInterval(step, 190);
}

/* ---------- 背景 ---------- */
function setBg(key, instant){
  const next = curLayer?0:1;
  const nl = $('#lay'+next), cl = $('#lay'+curLayer);
  const inner = nl.querySelector('.inner');
  inner.className='inner';
  inner.style.background = bgOf(key);
  inner.style.backgroundSize='cover';
  inner.style.backgroundPosition='center 22%';
  void inner.offsetWidth;
  inner.classList.add(next?'kb2':'kb');
  if(instant){ nl.style.transition='none'; } else { nl.style.transition=''; }
  nl.classList.add('on'); cl.classList.remove('on');
  curLayer = next;
  if(instant) requestAnimationFrame(()=>{ nl.style.transition=''; });
}
async function flash(ms=520){
  const f=$('#flash');
  f.style.transition='none'; f.style.opacity=.85;
  await sleep(30);
  f.style.transition=`opacity ${ms}ms ease`; f.style.opacity=0;
}

/* ---------- テキスト ---------- */
function nameOf(sp){ return sp==='a' ? '茜' : sp==='p' ? G.name : ''; }
function fill(t){ return t.replace(/\{n\}/g, G.name); }

function setPlate(sp){
  const p=$('#plate');
  const nm=nameOf(sp);
  if(nm){ $('#plateName').textContent=nm; p.classList.add('on'); }
  else p.classList.remove('on');
}
function pushLine(sp){
  const flow=$('#flow');
  [...flow.children].forEach(c=>c.classList.add('old'));
  const d=document.createElement('div');
  d.className='ln '+sp;
  flow.appendChild(d);
  while(flow.children.length>14) flow.removeChild(flow.firstChild);
  return d;
}
function scrollFlow(){
  const f=$('#flow'); f.scrollTop=f.scrollHeight;
  f.classList.toggle('masked', f.scrollTop>2);
}

async function typeInto(el, text, speed){
  typing=true; skipTyping=false;
  $('#bell').classList.remove('on');
  let blip=0;
  for(let i=0;i<text.length;i++){
    if(skipTyping){ el.textContent=text; scrollFlow(); break; }
    const ch=text[i];
    el.textContent += ch;
    scrollFlow();
    if(ch!=='\u3000' && ch!==' ' && (blip++ % 2 === 0)) Audio_.se(Math.random()<.25?'blip2':'blip');
    let d=speed;
    if('、，'.includes(ch)) d+=180;
    else if('。！？'.includes(ch)) d+=260;
    else if(ch==='…') d+=120;
    else if(ch==='\u3000') d+=90;
    await sleep(d);
  }
  typing=false;
  $('#bell').classList.add('on');
}
function tapPromise(){ return new Promise(res=>{ waitTap=()=>{ waitTap=null; res(); }; }); }

async function say(sp, text, opt){
  opt=opt||{};
  text=fill(text);
  setPlate(sp);
  const el=pushLine(sp);
  const base = 92 - CFG.speed*0.72;             // 55 → 約52ms
  const sp_ = opt.slow ? base*1.9 : opt.fast ? base*0.6 : base;
  await typeInto(el, text, sp_);
  curLog.push({sp, t:text});
  await tapPromise();
}

/* ---------- コマンド ---------- */
async function cmd(c){
  if(c.bg!==undefined){ setBg(c.bg); if(c.bg) markSeen(c.bg); }
  if(c.se) Audio_.se(c.se);
  if(c.bgm) Audio_.bgm(c.bgm);
  if(c.amb) Audio_.amb(c.amb, c.hold||6);
  if(c.ambStop) Audio_.stopAmb();
  if(c.fw!==undefined){ c.fw?FW.start():FW.stop(); }
  if(c.fwOne) FW.one(true);
  if(c.flick!==undefined) flicker(c.flick);
  if(c.flash) await flash(c.flash===true?520:c.flash);
  if(c.wait) await sleep(c.wait);
  if(c.clear) { $('#flow').innerHTML=''; }
  if(c.uiOff){ $('#ui').classList.remove('show'); }
  if(c.uiOn){ $('#ui').classList.add('show'); }
}
function markSeen(k){ if(SLOTMAP[k]){ G.seen[k]=1; } }

/* ---------- 選択肢 ---------- */
function showChoices(list){
  return new Promise(res=>{
    inChoice=true;
    const box=$('#choices'), dlg=$('#dialogue');
    box.innerHTML='';
    dlg.style.opacity='.42'; dlg.style.pointerEvents='none';
    list.forEach((c,i)=>{
      const b=document.createElement('button');
      b.className='ch'; b.textContent=fill(c.t);
      b.onclick=e=>{
        e.stopPropagation();
        Audio_.se('decide');
        box.classList.remove('on'); box.innerHTML='';
        dlg.style.opacity=''; dlg.style.pointerEvents='';
        inChoice=false;
        res(c);
      };
      box.appendChild(b);
    });
    box.classList.add('on');
    $('#bell').classList.remove('on');
  });
}

/* ---------- ログ ---------- */
function openLog(){
  const b=$('#logBody');
  if(!curLog.length){ b.innerHTML='<div class="logempty">この場面の会話はまだありません。</div>'; }
  else{
    b.innerHTML = curLog.map(l=>{
      const nm = l.sp==='a'?'茜': l.sp==='p'?esc(G.name):'';
      return `<div class="logline ${l.sp}">${nm?`<span class="logname">${nm}</span>`:''}<span class="logtext">${esc(l.t)}</span></div>`;
    }).join('');
  }
  $('#logOv').classList.add('on'); Audio_.se('open');
  b.scrollTop=b.scrollHeight;
}
function esc(s){ return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

/* ---------- UI 非表示 ---------- */
function hideUI(){
  if(CFG.uiHidden) return;
  CFG.uiHidden=true;
  $('#ui').classList.add('hidden');
  Audio_.se('close');
  setTimeout(()=>{
    const back=e=>{ e.preventDefault(); e.stopPropagation();
      CFG.uiHidden=false; $('#ui').classList.remove('hidden'); Audio_.se('open');
      document.removeEventListener('pointerdown',back,true); };
    document.addEventListener('pointerdown',back,true);
  },260);
}

/* ---------- シーン遷移 ---------- */
async function enterScene(sc){
  G.scene = sc.id;
  curLog = [];
  $('#flow').innerHTML='';
  $('#plate').classList.remove('on');
  $('#bell').classList.remove('on');
  $('#ui').classList.remove('show');
  if(sc.fw===false || sc.fw===undefined) { if(!sc.keepFw) FW.stop(); }
  if(sc.flick===undefined) flicker(null);
  if(sc.bg){ setBg(sc.bg); markSeen(sc.bg); }
  if(sc.bgm) Audio_.bgm(sc.bgm);
  if(sc.trans!==false) Audio_.se('trans');
  if(sc.amb) setTimeout(()=>Audio_.amb(sc.amb, sc.ambHold||6), 500);
  await save();
  await sleep(sc.hold || 1150);          // 1秒はイラストだけを見せる
  $('#ui').classList.add('show');
  await sleep(320);
}

async function runScene(id){
  let sc = SCENES[id];
  while(sc){
    if(typeof sc === 'function'){ sc = SCENES[sc()]; continue; }
    await enterScene(sc);
    const lines = typeof sc.lines==='function' ? sc.lines() : sc.lines;
    if(lines) for(const L of lines){
      if(Array.isArray(L)) await say(L[0], L[1], L[2]);
      else await cmd(L);
    }
    if(sc.ending){ await showEnding(sc.ending); return; }
    let nextId = sc.next;
    if(sc.choices){
      const list = typeof sc.choices==='function' ? sc.choices() : sc.choices;
      const c = await showChoices(list);
      if(c.k) G.kizuna += c.k;
      if(c.flag) G.flags[c.flag]=1;
      if(c.act) G.acts.push(c.act);
      if(c.res) for(const L of c.res){
        if(Array.isArray(L)) await say(L[0],L[1],L[2]); else await cmd(L);
      }
      if(c.go !== undefined) nextId = typeof c.go==='function' ? c.go() : c.go;
    }
    if(typeof nextId==='function') nextId = nextId();
    if(!nextId) break;
    sc = SCENES[nextId];
  }
}

/* =========================================================
   エンディング
   ========================================================= */
async function showEnding(e){
  FW.stop(); flicker(null); Audio_.stopAmb(1.2);
  $('#ui').classList.remove('show');
  $('#curtain').classList.add('on');
  Audio_.bgm('ed');
  await sleep(1400);
  $('#edTitle').textContent = e.t;
  $('#edSub').textContent = e.s;
  const k=G.kizuna;
  /* ルートごとに選択肢の数が違い、稼げる絆の最大値も違う
     （丘ルート:最大10 / 線香花火ルート:最大18）ため、
     しきい値もルートごとに用意する（共通の値だと丘ルートで
     上位2段階の文章が絶対に表示されなくなってしまう） */
  const EPI_TIERS = { oka:[9,7,5], hanao:[16,13,11] };
  const t = EPI_TIERS[e.route] || EPI_TIERS.hanao;
  $('#edEpi').textContent =
    k>=t[0] ? '――　この夜のことを、二人はきっと何度も話す。' :
    k>=t[1] ? '――　夏はまだ、少しだけ残っている。' :
    k>=t[2] ? '――　言えたことも、言えなかったことも、全部その夜のものだ。' :
              '――　それでも、となりにいた。';
  $('#ed').classList.add('on');
  Audio_.se('bell');
  G.cleared = 1;
  G.routeSeen[e.route] = 1;
  G.ending = e.t;
  await saveMeta();
  await Store.del('nnt_save');
}
$('#edBtn').onclick = async ()=>{
  Audio_.se('decide');
  $('#ed').classList.remove('on');
  $('#curtain').classList.remove('on');
  await showTitle();
};

/* =========================================================
   入力
   ========================================================= */
function advance(){
  if(inChoice) return;
  Audio_.resume();
  if(typing){ skipTyping=true; return; }
  if(waitTap) waitTap();
}
let sw={y:0,x:0,moved:false};
function down(e){
  const p = e.touches ? e.touches[0] : e;
  sw.y=p.clientY; sw.x=p.clientX; sw.moved=false;
}
function move(e){
  const p = e.touches ? e.touches[0] : e;
  if(Math.abs(p.clientY-sw.y)>8 || Math.abs(p.clientX-sw.x)>8) sw.moved=true;
}
function up(e){
  if(sw.moved) return;
  if(e.target.closest && e.target.closest('#topbar')) return;
  advance();
}
['#tap','#dialogue'].forEach(sel=>{
  const el=$(sel);
  el.addEventListener('touchstart', down, {passive:true});
  el.addEventListener('touchmove', move, {passive:true});
  el.addEventListener('touchend', up);
  el.addEventListener('mousedown', down);
  el.addEventListener('mousemove', move);
  el.addEventListener('mouseup', e=>{ if(!('ontouchstart' in window)) up(e); });
});

$('#volBgm').oninput = e=>{ CFG.vb=e.target.value/100; if(!muted) Audio_.setVol('bgm',CFG.vb); };
$('#volSe').oninput  = e=>{ CFG.vs=e.target.value/100; if(!muted) Audio_.setVol('se',CFG.vs); };

/* =========================================================
   タイトル
   ========================================================= */
async function showTitle(){
  FW.stop(); flicker(null); Audio_.stopAmb(1.0);
  $('#ui').classList.remove('show');
  $('#curtain').classList.remove('on');
  const meta = await Store.get('nnt_meta');
  if(meta){ G.cleared=meta.cleared||0; G.seen=Object.assign({},meta.seen||{}); G.routeSeen=meta.routeSeen||{}; if(meta.name) G.name=meta.name; }
  const sv = await loadSave();
  $('#btnCont').disabled = !sv;
  $('#btnGal').disabled = !G.cleared;
  const seenN = Object.keys(G.seen).length;
  $('#titleNote').textContent = G.cleared
    ? `思い出 ${seenN}/${SLOTS.length}　${G.routeSeen.oka&&G.routeSeen.hanao?'ふたつの夜を見届けました':'まだ見ていない夜があります'}`
    : '';
  refreshTitleBg();
  $('#title').classList.add('on');
  Audio_.bgm('yuu');
}
$('#btnNew').onclick = async e=>{
  e.stopPropagation(); Audio_.init(); Audio_.resume(); Audio_.se('decide');
  $('#nameInput').value = (G.name && G.name!=='きみ') ? G.name : '';
  $('#nameOv').classList.add('on');
};
$('#nameGo').onclick = async e=>{
  e.stopPropagation(); Audio_.se('decide');
  const v = $('#nameInput').value.trim();
  G.name = v || 'きみ';
  G.kizuna=0; G.flags={}; G.acts=[]; G.actN=0; G.ending=null; shufflePool();
  $('#nameOv').classList.remove('on');
  $('#title').classList.remove('on');
  await saveMeta();
  await runScene('prologue');
};
$('#btnCont').onclick = async e=>{
  e.stopPropagation(); Audio_.init(); Audio_.resume(); Audio_.se('decide');
  const sv = await loadSave();
  if(!sv) return;
  G.name=sv.name||'きみ'; G.kizuna=sv.kizuna||0; G.flags=sv.flags||{};
  G.acts=sv.acts||[]; G.actN=sv.actN||0; G.seen=sv.seen||{}; G.pool=sv.pool||null;
  G.cleared=sv.cleared||0; G.routeSeen=sv.routeSeen||{};
  $('#title').classList.remove('on');
  await runScene(sv.scene || 'prologue');
};
$('#btnGal').onclick = e=>{ e.stopPropagation(); Audio_.se('decide'); openGallery(); };

/* =========================================================
   起動
   ========================================================= */
(async function boot(){
  loadEmbeddedArt();
  refreshTitleBg();
  const meta = await Store.get('nnt_meta');
  if(meta){ G.cleared=meta.cleared||0; G.seen=meta.seen||{}; G.routeSeen=meta.routeSeen||{}; G.name=meta.name||'きみ'; }
  const settings = await loadSettings();
  if(settings){
    if(settings.vb!=null) CFG.vb=settings.vb;
    if(settings.vs!=null) CFG.vs=settings.vs;
    if(settings.speed!=null) CFG.speed=settings.speed;
    $('#volBgm').value=Math.round(CFG.vb*100);
    $('#volSe').value=Math.round(CFG.vs*100);
    $('#spd').value=CFG.speed;
    Audio_.setVol('bgm', CFG.vb);
    Audio_.setVol('se', CFG.vs);
  }
  await showTitle();
  window.addEventListener('pointerdown', ()=>Audio_.resume(), {once:true});
  const fit=()=>{ document.documentElement.style.setProperty('--vh', window.innerHeight+'px'); };
  fit(); window.addEventListener('resize', fit);
})();
